# =============================================================================
# tmux 設定 — macOS / Ghostty 最適化
# =============================================================================

# =============================================================================
# prefix キー: Ctrl-a（Ctrl-b から変更）
# =============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix       # 二重押しで端末にそのまま送る

# =============================================================================
# 端末・色設定（Ghostty + True Color）
# =============================================================================
set -g default-terminal "tmux-256color"
# True Color（24bit カラー）
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"
# Ghostty の独自シーケンスを通す
set -ag terminal-features ",ghostty:hyperlinks"
# アンダーラインの色（Neovim など）
set -as terminal-overrides ",*:Smulx=\E[4::%p1%dm"
set -as terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# =============================================================================
# 基本動作
# =============================================================================
set -g escape-time 10       # ESC のラグを最小化（vi モードのため）
set -g repeat-time 600      # リピートキーの受付時間（ms）
set -g history-limit 50000  # スクロールバック行数
set -g base-index 1         # ウィンドウ番号を 1 から始める
setw -g pane-base-index 1   # ペイン番号を 1 から始める
set -g renumber-windows on  # ウィンドウを閉じたとき番号を詰める
set -g display-time 2000    # メッセージの表示時間（ms）
set -g focus-events on      # フォーカスイベントを有効化（Neovim など）

# Claude Code に必要: エスケープシーケンスのパススルー
set -g allow-passthrough on

# =============================================================================
# マウス操作
# =============================================================================
set -g mouse on

# =============================================================================
# vi キーバインド
# =============================================================================
setw -g mode-keys vi

# コピーモードのキーバインド（vi 風）
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# =============================================================================
# ウィンドウ操作
# =============================================================================
bind c   new-window -c "#{pane_current_path}"   # 現在のパスで新規ウィンドウ
bind ,   command-prompt -I "#W" "rename-window '%%'"
bind &   kill-window

# =============================================================================
# ペイン操作
# =============================================================================
# 分割（現在のパスを引き継ぐ）
bind s   split-window -v -c "#{pane_current_path}"
bind v   split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# ペイン移動（vim 風 hjkl）
bind h   select-pane -L
bind j   select-pane -D
bind k   select-pane -U
bind l   select-pane -R

# ペインサイズ変更（リピート可能）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペインをズーム
bind z   resize-pane -Z

# =============================================================================
# セッション操作
# =============================================================================
bind N   new-session
bind S   choose-tree -sZ  # セッション一覧をツリー表示

# =============================================================================
# 設定のリロード
# =============================================================================
bind r   source-file ~/.tmux.conf \; display "tmux.conf reloaded!"

# =============================================================================
# ステータスバー
# =============================================================================
set -g status on
set -g status-interval 5          # 更新間隔（秒）
set -g status-position bottom

# 色設定（Ghostty のカラースキームと合わせやすいようにシンプルに）
set -g status-style                "fg=#cdd6f4,bg=#1e1e2e"
set -g status-left-length  40
set -g status-right-length 60

set -g status-left  " #[fg=#89b4fa,bold]#S #[fg=#6c7086]│ "
set -g status-right " #[fg=#6c7086]%Y-%m-%d #[fg=#89b4fa]%H:%M "

setw -g window-status-style         "fg=#6c7086,bg=#1e1e2e"
setw -g window-status-current-style "fg=#cdd6f4,bg=#313244,bold"
setw -g window-status-format        " #I:#W "
setw -g window-status-current-format " #I:#W "

# ペインボーダー
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# メッセージ
set -g message-style "fg=#cdd6f4,bg=#313244"
