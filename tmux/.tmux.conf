# =============================================================================
# tmux 設定 — macOS / Ghostty 最適化
# =============================================================================

# =============================================================================
# prefix キー: Ctrl-z（Ctrl-b / Ctrl-a から変更）
# zsh の Ctrl+a（行頭移動）を邪魔しないようにするため
# =============================================================================
unbind C-b
unbind C-a
set -g prefix C-z
# Ctrl+z の転送は prefix + z で行う（C-z は new-window に割り当てるため）

# =============================================================================
# 端末・色設定（Ghostty + True Color）
# =============================================================================
set -g default-terminal "tmux-256color"
# True Color（24bit カラー）
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"
# Ghostty の独自シーケンスを通す
set -ag terminal-features ",ghostty:hyperlinks"
# アンダーラインの色（Neovim など）
set -as terminal-overrides ",*:Smulx=\E[4::%p1%dm"
set -as terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# =============================================================================
# 基本動作
# =============================================================================
set -g escape-time 0        # ESC のラグをゼロに（Vim 使用時に重要）
set -g repeat-time 1000     # リピートキーの受付時間（ms）。連続操作に使う
set -g history-limit 10000  # スクロールバック行数
set -g base-index 1         # ウィンドウ番号を 1 から始める
setw -g pane-base-index 1   # ペイン番号を 1 から始める
set -g renumber-windows on  # ウィンドウを閉じたとき番号を詰める
set -g display-time 2000    # メッセージの表示時間（ms）
set -g focus-events on      # フォーカスイベントを有効化（Neovim など）

# ウィンドウ名の自動変更を無効化（プロンプトと干渉しないため）
set -g automatic-rename off
set -g allow-rename off

# Claude Code に必要: エスケープシーケンスのパススルー
set -g allow-passthrough on
set -g extended-keys on         # kitty keyboard protocol のパススルー（Shift+Enter 等）

# =============================================================================
# マウス操作
# =============================================================================
set -g mouse on

# =============================================================================
# vi キーバインド（コピーモード）
# =============================================================================
setw -g mode-keys vi

# コピーモードのキーバインド（vi 風）
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# =============================================================================
# ウィンドウ操作
# prefix の後、Ctrl を押しっぱなしでも動作する Ctrl+key も同時に定義
# =============================================================================
bind c   new-window -c "#{pane_current_path}"   # 新規ウィンドウ
bind z   new-window -c "#{pane_current_path}"   # z でも新規ウィンドウ
bind C-c new-window -c "#{pane_current_path}"   # Ctrl+c でも新規ウィンドウ
bind C-z new-window -c "#{pane_current_path}"   # Ctrl+z でも新規ウィンドウ

bind -r n   next-window         # 次のウィンドウ（repeat可）
bind -r C-n next-window         # Ctrl+n でも次のウィンドウ（repeat可）
bind -r p   previous-window     # 前のウィンドウ（repeat可）
bind -r C-p previous-window     # Ctrl+p でも前のウィンドウ（repeat可）

bind w   choose-window          # ウィンドウ一覧
bind C-w choose-window          # Ctrl+w でもウィンドウ一覧

bind f   command-prompt "find-window '%%'"   # ウィンドウ検索
bind C-f command-prompt "find-window '%%'"   # Ctrl+f でもウィンドウ検索

bind S   choose-tree -sZ        # セッション一覧（Ctrl 版なし）

bind d   detach-client          # デタッチ
bind C-d detach-client          # Ctrl+d でもデタッチ

bind ,   command-prompt -I "#W" "rename-window '%%'"
bind &   kill-window

# =============================================================================
# ペイン操作
# =============================================================================
# 分割（現在のパスを引き継ぐ）
bind v   split-window -h -c "#{pane_current_path}"   # 左右に分割
bind s   split-window -v -c "#{pane_current_path}"   # 上下に分割
unbind '"'
unbind %

# ペイン移動（vim 風 hjkl、repeat可）
bind -r h   select-pane -L
bind -r j   select-pane -D
bind -r k   select-pane -U
bind -r l   select-pane -R
bind -r C-h select-pane -L      # Ctrl+h でも移動
bind -r C-j select-pane -D      # Ctrl+j でも移動
bind -r C-k select-pane -U      # Ctrl+k でも移動
bind -r C-l select-pane -R      # Ctrl+l でも移動

# ペインサイズ変更（リピート可能、5セルずつ）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペインを閉じる
bind q   kill-pane
bind C-q kill-pane              # Ctrl+q でも閉じる

# ペイン番号表示
bind x   display-panes
bind C-x display-panes          # Ctrl+x でも表示

# ペインローテーション
bind o   rotate-window
bind C-o rotate-window          # Ctrl+o でもローテーション

# ペインズーム（m = maximize）
bind m   resize-pane -Z

# =============================================================================
# セッション操作
# =============================================================================
bind N   new-session

# =============================================================================
# 設定のリロード
# =============================================================================
bind r   source-file ~/.tmux.conf \; display "tmux.conf reloaded!"
bind C-r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"   # Ctrl+r でもリロード

# =============================================================================
# ステータスバー（Night Owl カラー）
# Oh My Posh テーマと共通のカラーパレット
# 背景: #011627  アクセント: #9FDAF4（ライトブルー）
# =============================================================================
set -g status on
set -g status-interval 5          # 更新間隔（秒）
set -g status-position bottom

set -g status-style                "fg=#9FDAF4,bg=#011627"
set -g status-left-length  40
set -g status-right-length 60

set -g status-left  " #[fg=#9FDAF4,bold]#S #[fg=#1d3b53]│ "
set -g status-right " #[fg=#e06c75]#(tmux show-environment -g SSH_CONNECTION 2>/dev/null | grep -q '^SSH_CONNECTION=' && printf 'SSH ')#[fg=#1d3b53]%Y-%m-%d #[fg=#9FDAF4]%H:%M "

setw -g window-status-style         "fg=#1d3b53,bg=#011627"
setw -g window-status-current-style "fg=#011627,bg=#9FDAF4,bold"
setw -g window-status-format        " #I:#W "
setw -g window-status-current-format " #I:#W "

# ペインボーダー
set -g pane-border-style        "fg=#1d3b53"
set -g pane-active-border-style "fg=#9FDAF4"

# メッセージ
set -g message-style "fg=#9FDAF4,bg=#011627"

# =============================================================================
# プラグイン (TPM — Tmux Plugin Manager)
# 初回: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#       その後 prefix + I でインストール
# 更新: prefix + U
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-continuum: 15 分ごとに自動保存、起動時に自動復元
set -g @continuum-restore 'on'

# Neovim セッションも復元対象にする
set -g @resurrect-strategy-nvim 'session'

# resurrect のデフォルトキーバインドを無効化（F10/F11 に退避）
# コマンドラインからは tmux-save / tmux-restore エイリアスで操作する
set -g @resurrect-save    'F10'
set -g @resurrect-restore 'F11'

# TPM 初期化（必ず最終行に置く）
run '~/.tmux/plugins/tpm/tpm'
